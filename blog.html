<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blog — Naren Manikandan</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav><a href="/">home</a></nav>
  <h1>Blog</h1>
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        — <time>{{ post.date | date: "%b %-d, %Y" }}</time>
      </li>
    {% endfor %}
  </ul>
</body>
</html>
